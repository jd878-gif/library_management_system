version: "3.8"

services:
  library-api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    env_file:
      - .env
    networks:
      - library-network
    restart: on-failure

  mysql:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: jeet1108
      MYSQL_DATABASE: library_db
    ports:
      - "3308:3306"
    networks:
      - library-network

networks:
  library-network:
    driver: bridge